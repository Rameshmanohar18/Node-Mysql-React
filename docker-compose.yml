services:
  mysql:
    image: mysql:8.4
    container_name: mysql-crud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: crud_app
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: mysql-crud-server
    restart: unless-stopped
    environment:
      PORT: 5001
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_DATABASE: crud_app
      DB_NAME: crud_app
      DB_TABLENAME: users
      DB_WAITFORCONNECTIONS: "true"
      DB_CONNECTIONLIMIT: 10
      DB_QUEUELIMIT: 0
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./frontend
    container_name: mysql-crud-frontend
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:80"

volumes:
  mysql_data:
